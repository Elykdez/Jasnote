# Main workflow for building and releasing the desktop app

name: CI/CD

env:
  DOTNET_VERSION: "8.0.x"
  NAME: "jesnote"
  FULLNAME: "Jesnote"
  PROJECT_PATH: "src/Jesnote.csproj"
  VERSION: "0.0.0"

on: push

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} -c Release --no-restore

  package:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            rid: win-x64
            platform: windows-x64
          - runner: macos-latest
            rid: osx-arm64
            platform: macos-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Set version
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          "version=$version" >> $env:GITHUB_OUTPUT
          "VERSION=$version" >> $env:GITHUB_ENV

      - name: Publish
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          -c Release
          -r ${{ matrix.rid }}
          --self-contained false
          -o publish/${{ env.FULLNAME }}

      - name: Prepare package
        shell: pwsh
        run: |
          Copy-Item README.md publish/${{ env.FULLNAME }}/README.md -Force
          Copy-Item LICENSE publish/${{ env.FULLNAME }}/LICENSE -Force
          Get-ChildItem publish/${{ env.FULLNAME }} -Filter *.pdb | Remove-Item -Force
          Compress-Archive `
            -Path publish/${{ env.FULLNAME }}/* `
            -DestinationPath ${{ env.NAME }}-${{ steps.version.outputs.version }}-${{ matrix.platform }}.zip `
            -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ env.NAME }}-${{ matrix.platform }}
          path: ${{ env.NAME }}-${{ steps.version.outputs.version }}-${{ matrix.platform }}.zip
          if-no-files-found: error
          overwrite: true

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          merge-multiple: true

      - name: Set version
        id: version
        run: |
          VERSION=${{ github.ref_name }}
          echo "version=${VERSION:1}" >> $GITHUB_OUTPUT
          echo "VERSION=${VERSION:1}" >> $GITHUB_ENV

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          fail_on_unmatched_files: true
          files: |
            ${{ env.NAME }}-${{ steps.version.outputs.version }}-windows-x64.zip
            ${{ env.NAME }}-${{ steps.version.outputs.version }}-macos-arm64.zip
